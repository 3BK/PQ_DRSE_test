name: Rust CI — musl-static

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  TARGET: x86_64-unknown-linux-musl

permissions:
  contents: read

jobs:

  # ── 1. Lint & Format ──────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install musl toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends musl-tools

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: ${{ env.TARGET }}

      - name: Run cargo-deny
        run: cargo deny check

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: lint-${{ runner.os }}-${{ env.TARGET }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            lint-${{ runner.os }}-${{ env.TARGET }}-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (all targets)
        run: cargo clippy --all-targets --target ${{ env.TARGET }} -- -D warnings


  # ── 2. Build (musl-static release) ───────────────────────────────
  build:
    name: Build (musl-static release)
    runs-on: ubuntu-24.04
    needs: lint

    steps:
      - uses: actions/checkout@v6

      - name: Install musl toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends musl-tools

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ env.TARGET }}

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: build-${{ runner.os }}-${{ env.TARGET }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            build-${{ runner.os }}-${{ env.TARGET }}-

      - name: Build all binaries
        run: |
          cargo build --release --target ${{ env.TARGET }} \
            --bin drse_keygen \
            --bin drse_producer \
            --bin drse_consumer

      - name: Verify static linkage (all binaries)
        run: |
          for bin in drse_keygen drse_producer drse_consumer; do
            echo "--- Verifying $bin ---"
            ! ldd target/${{ env.TARGET }}/release/$bin 2>&1 | grep -q "=>"
            file target/${{ env.TARGET }}/release/$bin
            echo "$bin is statically linked ✓"
          done

      - name: Upload drse_keygen
        uses: actions/upload-artifact@v7
        with:
          name: drse_keygen-musl-static
          path: target/${{ env.TARGET }}/release/drse_keygen
          if-no-files-found: error
          retention-days: 14

      - name: Upload drse_producer
        uses: actions/upload-artifact@v7
        with:
          name: drse_producer-musl-static
          path: target/${{ env.TARGET }}/release/drse_producer
          if-no-files-found: error
          retention-days: 14

      - name: Upload drse_consumer
        uses: actions/upload-artifact@v7
        with:
          name: drse_consumer-musl-static
          path: target/${{ env.TARGET }}/release/drse_consumer
          if-no-files-found: error
          retention-days: 14


  # ── 3. Test ───────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-24.04
    needs: lint

    steps:
      - uses: actions/checkout@v6

      - name: Install musl toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends musl-tools

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ env.TARGET }}

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: test-${{ runner.os }}-${{ env.TARGET }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            test-${{ runner.os }}-${{ env.TARGET }}-

      - name: Run tests
        run: cargo test --target ${{ env.TARGET }}


  # ── 4. Audit ──────────────────────────────────────────────────────
  audit:
    name: Supply-Chain Audit
    runs-on: ubuntu-24.04
    needs: build

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - run: cargo install cargo-audit --locked

      - run: cargo audit


  # ── 5. SBOM ───────────────────────────────────────────────────────
  sbom:
    name: SBOM (CycloneDX)
    runs-on: ubuntu-24.04
    needs: build

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - run: cargo install cargo-cyclonedx --locked

      - name: Generate SBOM
        run: cargo cyclonedx --format json --override-filename sbom-cyclonedx

      - name: Upload SBOM
        uses: actions/upload-artifact@v7
        with:
          name: sbom-cyclonedx
          path: "*.json"
          if-no-files-found: warn
          retention-days: 90
